<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>知识图谱 · __WIKI_TITLE__</title>

<!-- 字体：思源 + Kalam（手绘英文） + JetBrains Mono -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ============================================================
   Tweakable tokens
   ============================================================ */
:root {
  /* paper palette */
  --paper-cream:   #f6efe0;
  --paper-warm:    #efe6d0;
  --paper-ink:     #2b2620;
  --paper-ink-dim: #6b5e4f;
  --paper-ink-faint:#a69b87;
  --paper-rule:    #d7c9aa;
  --paper-margin:  #b9423a;   /* 红色批注线（像作业本页边） */

  /* accent pencils */
  --pen-indigo:  #2b4e7a;
  --pen-teal:    #2d6b63;
  --pen-mustard: #b7812f;
  --pen-plum:    #7a3f6b;
  --pen-rust:    #b65239;
  --pen-olive:   #6a7a2f;
  --pen-slate:   #4a4e5a;
  --pen-rose:    #9c4863;

  /* edges */
  --edge-extracted: #3d5a3d;
  --edge-inferred:  #8a6a2a;
  --edge-ambiguous: #a04a3f;

  /* node types */
  --node-entity: #2b4e7a;
  --node-topic:  #b7812f;
  --node-source: #7a3f6b;

  /* ui */
  --font-hand:  "Kalam", "Noto Serif SC", "LXGW WenKai", serif;
  --font-text:  "Noto Serif SC", "Songti SC", "LXGW WenKai", Georgia, serif;
  --font-ui:    "Noto Sans SC", -apple-system, "PingFang SC", sans-serif;
  --font-mono:  "JetBrains Mono", ui-monospace, Menlo, monospace;

  --drawer-w: 440px;
  --radius: 6px;
}

*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  height: 100vh; width: 100vw;
  overflow: hidden;
  color: var(--paper-ink);
  font-family: var(--font-ui);
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  background: var(--paper-cream);
}

/* ============================================================
   Paper background — layered textures
   ============================================================ */
.paper-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    /* faint grid lines */
    repeating-linear-gradient(0deg,
      transparent 0 27px,
      rgba(139, 119, 85, 0.06) 27px 28px),
    repeating-linear-gradient(90deg,
      transparent 0 27px,
      rgba(139, 119, 85, 0.04) 27px 28px),
    /* warm paper gradient */
    radial-gradient(ellipse at 20% 10%, #faf3e2 0%, transparent 55%),
    radial-gradient(ellipse at 85% 90%, #e8dcc0 0%, transparent 60%),
    linear-gradient(180deg, #f6efe0 0%, #ede2c8 100%);
}

/* subtle paper fiber noise (SVG) */
.paper-bg::after {
  content: "";
  position: absolute;
  inset: 0;
  opacity: 0.35;
  mix-blend-mode: multiply;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.35  0 0 0 0 0.28  0 0 0 0 0.18  0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
}

/* red margin line — like notebook */
.margin-line {
  position: fixed;
  top: 0; bottom: 0;
  left: 78px;
  width: 1px;
  background: var(--paper-margin);
  opacity: 0.45;
  z-index: 1;
  pointer-events: none;
}
.margin-line::before {
  content: "";
  position: absolute;
  left: -1px; top: 0; bottom: 0;
  width: 3px;
  background: var(--paper-margin);
  opacity: 0.25;
  filter: blur(1px);
}

/* ============================================================
   Layout
   ============================================================ */
.app {
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: 1fr 0fr;
  grid-template-rows: auto auto 1fr auto;
  grid-template-areas:
    "brand   drawer"
    "tools   drawer"
    "canvas  drawer"
    "footer  drawer";
  height: 100vh;
  width: 100vw;
  transition: grid-template-columns 280ms cubic-bezier(.4,0,.2,1);
}
.app.drawer-open {
  grid-template-columns: 1fr var(--drawer-w);
}

/* ---------- Brand bar (paper-style header) ---------- */
.brand {
  grid-area: brand;
  display: flex;
  align-items: baseline;
  gap: 18px;
  padding: 18px 28px 8px 100px;
  position: relative;
}
.brand__mark {
  font-family: var(--font-hand);
  font-weight: 700;
  font-size: 26px;
  color: var(--paper-ink);
  letter-spacing: 0.5px;
  position: relative;
  transform: rotate(-0.6deg);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.brand__mark::before {
  content: "";
  display: inline-block;
  width: 22px; height: 22px;
  background: radial-gradient(circle at 35% 35%, var(--pen-rust) 0%, #7a2d24 100%);
  border-radius: 50%;
  box-shadow: 1px 2px 0 rgba(0,0,0,0.12);
  transform: rotate(12deg);
}
.brand__title {
  font-family: var(--font-text);
  font-size: 17px;
  font-weight: 500;
  color: var(--paper-ink);
  border-bottom: 2px dotted var(--paper-ink-dim);
  padding-bottom: 1px;
}
.brand__sub {
  font-family: var(--font-hand);
  font-size: 14px;
  color: var(--paper-ink-dim);
  margin-left: auto;
  transform: rotate(-0.4deg);
}
.brand__sub b { color: var(--pen-rust); font-weight: 700; }

/* ---------- Toolbar ---------- */
.tools {
  grid-area: tools;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 4px 28px 14px 100px;
  flex-wrap: wrap;
  position: relative;
}
.tools::after {
  content: "";
  position: absolute;
  left: 100px; right: 28px; bottom: 4px;
  height: 1px;
  background: repeating-linear-gradient(90deg,
    var(--paper-ink-dim) 0 4px, transparent 4px 8px);
  opacity: 0.35;
}

.search {
  position: relative;
  flex: 0 0 300px;
  max-width: 40%;
}
.search__input {
  width: 100%;
  height: 36px;
  padding: 0 14px 0 38px;
  font: 14px var(--font-ui);
  color: var(--paper-ink);
  background: rgba(255, 252, 243, 0.7);
  border: 1.5px solid var(--paper-ink-dim);
  border-radius: 20px;
  outline: none;
  transition: border-color 150ms, background 150ms;
}
.search__input:focus {
  border-color: var(--pen-rust);
  background: #fffdf6;
  box-shadow: 0 0 0 3px rgba(182, 82, 57, 0.12);
}
.search__icon {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  color: var(--paper-ink-dim);
  pointer-events: none;
}
.search__hint {
  position: absolute;
  right: 10px; top: 50%;
  transform: translateY(-50%);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--paper-ink-faint);
  background: var(--paper-warm);
  padding: 1px 6px;
  border-radius: 3px;
  pointer-events: none;
}
.search:focus-within .search__hint { display: none; }

.search__dropdown {
  position: absolute;
  top: calc(100% + 6px);
  left: 0; right: 0;
  background: #fffdf6;
  border: 1.5px solid var(--paper-ink-dim);
  border-radius: var(--radius);
  box-shadow: 2px 4px 0 rgba(43, 38, 32, 0.08);
  padding: 6px;
  font-size: 13px;
  display: none;
  max-height: 280px;
  overflow-y: auto;
  z-index: 30;
}
.search__dropdown[data-open="1"] { display: block; }
.search__item {
  padding: 7px 10px;
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
}
.search__item:hover, .search__item[data-active="1"] { background: var(--paper-warm); }
.search__item .type-dot {
  width: 10px; height: 10px; border-radius: 50%;
  flex-shrink: 0;
}
.search__item .name { flex: 1; font-family: var(--font-text); }
.search__item .meta { font-size: 11px; color: var(--paper-ink-faint); }

/* Filter chips */
.filters {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 6px 12px;
  font-size: 13px;
  font-family: var(--font-ui);
  color: var(--paper-ink-dim);
  background: transparent;
  border: 1.5px dashed var(--paper-ink-faint);
  border-radius: 16px;
  cursor: pointer;
  transition: all 150ms;
  user-select: none;
}
.chip[data-on="1"] {
  color: var(--paper-ink);
  background: rgba(255, 252, 243, 0.9);
  border-style: solid;
  border-color: var(--paper-ink);
  box-shadow: 1px 2px 0 rgba(43, 38, 32, 0.1);
}
.chip:hover { color: var(--paper-ink); }
.chip__swatch {
  display: inline-block;
  width: 22px; height: 3px;
  background: currentColor;
  position: relative;
}
.chip--inferred .chip__swatch { background: transparent; border-top: 2px dashed currentColor; height: 0; }
.chip--ambiguous .chip__swatch { background: transparent; border-top: 2px dotted currentColor; height: 0; }
.chip--extracted { color: var(--edge-extracted); }
.chip--inferred  { color: var(--edge-inferred); }
.chip--ambiguous { color: var(--edge-ambiguous); }

.tools__spacer { flex: 1; }

.iconbtn {
  width: 34px; height: 34px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: 1.5px solid var(--paper-ink-faint);
  border-radius: 50%;
  color: var(--paper-ink-dim);
  cursor: pointer;
  transition: all 150ms;
}
.iconbtn:hover { border-color: var(--paper-ink); color: var(--paper-ink); background: rgba(255,252,243,0.6); }
.iconbtn[data-on="1"] { border-color: var(--pen-rust); color: var(--pen-rust); background: rgba(255,252,243,0.9); }
.iconbtn svg { width: 16px; height: 16px; }

/* ---------- Canvas ---------- */
.canvas-wrap {
  grid-area: canvas;
  position: relative;
  overflow: hidden;
}
#canvas {
  width: 100%; height: 100%;
  display: block;
  cursor: grab;
  outline: none;
}
#canvas:active { cursor: grabbing; }

/* Canvas overlay badges */
.legend {
  position: absolute;
  left: 28px; bottom: 26px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  background: rgba(255, 252, 243, 0.85);
  backdrop-filter: blur(4px);
  padding: 12px 14px;
  border-radius: var(--radius);
  border: 1.5px solid var(--paper-ink-faint);
  box-shadow: 2px 3px 0 rgba(43, 38, 32, 0.06);
  font-size: 12px;
  transform: rotate(-0.3deg);
  z-index: 5;
}
.legend__title {
  font-family: var(--font-hand);
  font-weight: 700;
  font-size: 14px;
  color: var(--paper-ink);
  margin-bottom: 4px;
}
.legend__row {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--paper-ink-dim);
}
.legend__dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 2px solid currentColor;
}
.legend__dot--sq { border-radius: 3px; transform: rotate(3deg); }
.legend__dot--dia { border-radius: 2px; transform: rotate(45deg); width: 12px; height: 12px; }

/* Card swatch: a tiny rectangle with a folder-tab on top */
.legend__card {
  position: relative;
  display: inline-block;
  width: 22px; height: 13px;
  border: 1.3px solid currentColor;
  border-radius: 3px;
  background: rgba(253, 248, 234, 0.8);
  flex: 0 0 auto;
  margin-right: 2px;
}
.legend__card::before {
  content: "";
  position: absolute;
  top: -4px; left: 5px;
  width: 9px; height: 4px;
  background: currentColor;
  border-radius: 2px 2px 0 0;
  opacity: 0.9;
}
.legend__glyph {
  font-family: var(--font-hand);
  font-size: 13px;
  color: currentColor;
  opacity: 0.7;
  margin-right: 4px;
  width: 10px;
  text-align: center;
  display: inline-block;
}

/* zoom controls */
.zoom-ctrl {
  position: absolute;
  right: 20px; bottom: 26px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 5;
}
.zoom-ctrl button {
  width: 38px; height: 38px;
  background: rgba(255, 252, 243, 0.9);
  border: 1.5px solid var(--paper-ink-dim);
  border-radius: 50%;
  font-family: var(--font-hand);
  font-size: 18px;
  color: var(--paper-ink);
  cursor: pointer;
  box-shadow: 1px 2px 0 rgba(43,38,32,0.1);
  transition: transform 120ms;
}
.zoom-ctrl button:hover { transform: translateY(-1px); }
.zoom-ctrl button:active { transform: translateY(1px); box-shadow: 1px 1px 0 rgba(43,38,32,0.1); }

/* Minimap */
.minimap {
  position: absolute;
  right: 20px; top: 20px;
  width: 180px; height: 130px;
  background: rgba(255, 252, 243, 0.9);
  border: 1.5px solid var(--paper-ink-dim);
  border-radius: var(--radius);
  box-shadow: 2px 3px 0 rgba(43,38,32,0.08);
  overflow: hidden;
  z-index: 5;
  transform: rotate(0.4deg);
}
.minimap__label {
  position: absolute;
  top: -8px; left: 10px;
  background: var(--paper-warm);
  padding: 1px 8px;
  font-family: var(--font-hand);
  font-size: 11px;
  color: var(--paper-ink-dim);
  border-radius: 3px;
  z-index: 2;
}
#minimap-svg { width: 100%; height: 100%; cursor: pointer; }
.minimap__viewport {
  fill: rgba(182, 82, 57, 0.15);
  stroke: var(--pen-rust);
  stroke-width: 1.2;
  stroke-dasharray: 3 2;
}

/* Toast */
.toast {
  position: absolute;
  top: 24px; left: 50%;
  transform: translateX(-50%) translateY(-10px);
  padding: 8px 16px;
  background: var(--paper-ink);
  color: #fdf7e6;
  border-radius: 20px;
  font-size: 13px;
  font-family: var(--font-ui);
  opacity: 0;
  transition: opacity 220ms, transform 220ms;
  pointer-events: none;
  z-index: 20;
  box-shadow: 2px 4px 0 rgba(43,38,32,0.15);
}
.toast[data-show="1"] { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Loading */
.loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
  color: var(--paper-ink-dim);
  font-family: var(--font-hand);
  font-size: 18px;
  pointer-events: none;
  transition: opacity 300ms;
}
.loading[data-hide="1"] { opacity: 0; }
.loading__scribble {
  width: 120px; height: 40px;
}

/* ---------- Footer ---------- */
.footer {
  grid-area: footer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 8px 28px 12px 100px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--paper-ink-faint);
  position: relative;
}
.footer a { color: var(--paper-ink-dim); text-decoration: none; border-bottom: 1px dotted; }
.footer__stats b { color: var(--paper-ink); font-weight: 500; }

/* ---------- Drawer ---------- */
.drawer {
  grid-area: drawer;
  overflow: hidden;
  background: #fdf7e6;
  border-left: 1.5px solid var(--paper-ink-dim);
  display: flex;
  flex-direction: column;
  position: relative;
}
.drawer::before {
  content: "";
  position: absolute;
  top: 0; bottom: 0;
  left: 24px;
  width: 1px;
  background: var(--paper-margin);
  opacity: 0.4;
}
.drawer-inner {
  width: var(--drawer-w);
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.drawer-head {
  padding: 22px 28px 16px 48px;
  border-bottom: 1px dashed var(--paper-ink-faint);
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.drawer-head__main { flex: 1; min-width: 0; }
.drawer-kicker {
  font-family: var(--font-hand);
  font-size: 12px;
  color: var(--pen-rust);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.drawer-title {
  margin: 0;
  font-family: var(--font-text);
  font-size: 26px;
  font-weight: 600;
  line-height: 1.25;
  color: var(--paper-ink);
  word-break: break-word;
}
.drawer-meta {
  display: flex;
  gap: 10px;
  margin-top: 10px;
  font-size: 11px;
  color: var(--paper-ink-dim);
  font-family: var(--font-mono);
}
.drawer-meta span {
  padding: 2px 7px;
  background: var(--paper-warm);
  border-radius: 10px;
}
.drawer-close {
  width: 30px; height: 30px;
  background: transparent;
  border: 1.5px solid var(--paper-ink-faint);
  border-radius: 50%;
  color: var(--paper-ink-dim);
  font-size: 16px;
  line-height: 1;
  cursor: pointer;
  flex-shrink: 0;
}
.drawer-close:hover { color: var(--paper-ink); border-color: var(--paper-ink); }

.drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 28px 40px 48px;
  font-family: var(--font-text);
  font-size: 15px;
  line-height: 1.8;
  color: var(--paper-ink);
}
.drawer-body h1 { font-size: 22px; margin: 20px 0 10px; font-weight: 600; }
.drawer-body h1:first-child { display: none; } /* already in title */
.drawer-body h2 {
  font-size: 17px; margin: 22px 0 8px; font-weight: 600;
  padding-left: 10px;
  border-left: 3px solid var(--pen-rust);
}
.drawer-body h3 { font-size: 15px; margin: 14px 0 6px; font-weight: 600; color: var(--paper-ink-dim); }
.drawer-body p { margin: 8px 0; }
.drawer-body code {
  font-family: var(--font-mono);
  font-size: 13px;
  background: var(--paper-warm);
  padding: 1px 6px;
  border-radius: 3px;
  color: var(--pen-rust);
}
.drawer-body pre {
  background: #2b2620;
  color: #f0e4ce;
  padding: 14px 16px;
  border-radius: var(--radius);
  overflow-x: auto;
  font-size: 13px;
  line-height: 1.6;
}
.drawer-body pre code { background: transparent; color: inherit; padding: 0; }
.drawer-body ul, .drawer-body ol { padding-left: 22px; }
.drawer-body li { margin: 4px 0; }
.drawer-body blockquote {
  margin: 14px 0;
  padding: 8px 14px;
  background: var(--paper-warm);
  border-left: 3px solid var(--pen-mustard);
  font-style: italic;
  color: var(--paper-ink-dim);
  border-radius: 0 var(--radius) var(--radius) 0;
}
.drawer-body a.wikilink {
  color: var(--pen-indigo);
  text-decoration: none;
  background-image: linear-gradient(transparent 70%, rgba(43, 78, 122, 0.25) 70%);
  padding: 0 2px;
  cursor: pointer;
  transition: background-image 150ms;
}
.drawer-body a.wikilink:hover {
  background-image: linear-gradient(transparent 0%, rgba(43, 78, 122, 0.25) 0%);
}
.drawer-body a.wikilink--dead {
  color: var(--paper-ink-faint);
  text-decoration: line-through;
  background: none;
  cursor: help;
}

/* neighbors list at the bottom of the drawer */
.drawer-neighbors {
  padding: 0 28px 24px 48px;
  border-top: 1px dashed var(--paper-ink-faint);
  margin-top: 8px;
}
.drawer-neighbors h4 {
  font-family: var(--font-hand);
  font-size: 15px;
  color: var(--paper-ink-dim);
  margin: 16px 0 10px;
  font-weight: 700;
}
.nb-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.nb-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  font-family: var(--font-text);
  transition: background 120ms;
}
.nb-item:hover { background: var(--paper-warm); }
.nb-item__arrow {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--paper-ink-faint);
  width: 22px;
}
.nb-item__type {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.nb-item__name { flex: 1; }
.nb-item__rel {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 8px;
}
.nb-item__rel[data-rel="EXTRACTED"] { background: rgba(61,90,61,0.15); color: var(--edge-extracted); }
.nb-item__rel[data-rel="INFERRED"]  { background: rgba(138,106,42,0.15); color: var(--edge-inferred); }
.nb-item__rel[data-rel="AMBIGUOUS"] { background: rgba(160,74,63,0.15); color: var(--edge-ambiguous); }

/* ============================================================
   SVG graph styles
   ============================================================ */
.community-blob {
  fill: var(--blob-fill, rgba(183, 129, 47, 0.08));
  stroke: var(--blob-stroke, rgba(183, 129, 47, 0.35));
  stroke-width: 1.5;
  stroke-dasharray: 4 3;
  transition: opacity 240ms, fill 240ms, stroke 240ms;
}
.community-label {
  font-family: var(--font-hand);
  font-size: 15px;
  font-weight: 700;
  fill: var(--paper-ink-dim);
  pointer-events: none;
}

.edge-group .edge {
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: opacity 200ms, stroke-width 200ms;
}
.edge[data-type="EXTRACTED"] { stroke: var(--edge-extracted); stroke-width: 1.4; }
.edge[data-type="INFERRED"]  { stroke: var(--edge-inferred);  stroke-width: 1.3; stroke-dasharray: 5 4; }
.edge[data-type="AMBIGUOUS"] { stroke: var(--edge-ambiguous); stroke-width: 1.2; stroke-dasharray: 1.5 3.5; }
.edge--dim { opacity: 0.12; }
.edge--hi  { stroke-width: 2.4; }

.node-group { cursor: pointer; }
.node-shape {
  stroke: var(--node-stroke, var(--node-entity));
  stroke-width: 1.8;
  fill: #fffdf6;
  transition: stroke-width 160ms, filter 160ms;
  filter: drop-shadow(1px 2px 0 rgba(43, 38, 32, 0.08));
}
.node-group[data-selected="1"] .node-shape {
  stroke-width: 3;
  filter: drop-shadow(1px 2px 0 rgba(43, 38, 32, 0.2));
}
.node-group.pulse .node-shape {
  animation: pulse 1.2s ease-out;
}
@keyframes pulse {
  0%   { transform: scale(1);   }
  40%  { transform: scale(1.3); }
  100% { transform: scale(1);   }
}
.node-group.pulse {
  transform-box: fill-box;
  transform-origin: center;
}

.node-halo {
  fill: none;
  stroke: var(--node-stroke, var(--node-entity));
  stroke-width: 1.2;
  opacity: 0;
  transition: opacity 160ms;
}
.node-group[data-hover="1"] .node-halo,
.node-group[data-selected="1"] .node-halo { opacity: 0.35; }

.node-label {
  font-family: var(--font-text);
  font-size: 13px;
  font-weight: 500;
  fill: var(--paper-ink);
  pointer-events: none;
  paint-order: stroke fill;
  stroke: rgba(246, 239, 224, 0.9);
  stroke-width: 3.5;
  stroke-linejoin: round;
}
.node-group--topic .node-label { font-weight: 700; font-size: 14px; }

.node-icon {
  fill: var(--node-stroke, var(--node-entity));
  pointer-events: none;
}

/* ---- Card-style nodes ---- */
.node-card {
  fill: var(--node-card-fill, #fbf5e6);
  stroke-width: 1.5;
  filter: drop-shadow(1.5px 2.5px 0 rgba(43, 38, 32, 0.08));
}
.node-group[data-selected="1"] .node-card {
  stroke-width: 2.4;
  filter: drop-shadow(2px 3px 0 rgba(43, 38, 32, 0.2));
}
.node-tab {
  /* fill + stroke set inline by type color */
  fill-opacity: 0.85;
  stroke-width: 1;
  pointer-events: none;
}
.node-label--in {
  font-family: var(--font-text);
  font-size: 13px;
  font-weight: 500;
  fill: var(--paper-ink);
  pointer-events: none;
  stroke: none;
}
.node-group--topic .node-label--in { font-weight: 700; font-size: 14px; }
.node-glyph {
  font-family: var(--font-hand);
  font-size: 11px;
  opacity: 0.55;
  pointer-events: none;
}
body[data-variant="wash"] .node-card {
  fill: rgba(253, 248, 234, 0.92);
}

/* ---- Watercolor wash blobs ---- */
.community-wash {
  pointer-events: none;
  mix-blend-mode: multiply;
}
.community-label--wash {
  font-family: var(--font-hand);
  font-size: 14px;
  letter-spacing: 2px;
  font-weight: 500;
  opacity: 0.8;
  pointer-events: none;
}
body[data-variant="wash"] {
  /* stronger paper feel */
}

.graph-dim .edge, .graph-dim .node-group:not(.focus):not(.neighbor) {
  opacity: 0.18;
}
.graph-dim .edge.hi-path { opacity: 1; }

/* ============================================================
   Tweaks panel
   ============================================================ */
.tweaks {
  position: fixed;
  right: 20px; bottom: 20px;
  width: 260px;
  background: #fffdf6;
  border: 1.5px solid var(--paper-ink);
  border-radius: var(--radius);
  box-shadow: 3px 5px 0 rgba(43,38,32,0.15);
  padding: 14px 16px 16px;
  font-family: var(--font-ui);
  font-size: 13px;
  z-index: 50;
  display: none;
  transform: rotate(-0.3deg);
}
.tweaks[data-open="1"] { display: block; }
.tweaks__title {
  font-family: var(--font-hand);
  font-weight: 700;
  font-size: 18px;
  color: var(--paper-ink);
  margin: 0 0 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tweaks__title::before {
  content: "";
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--pen-rust);
}
.tweaks__label {
  display: block;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--paper-ink-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin: 12px 0 6px;
}
.tweaks__seg {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  padding: 3px;
  background: var(--paper-warm);
  border-radius: 6px;
}
.tweaks__seg button {
  padding: 7px 4px;
  font-family: var(--font-text);
  font-size: 13px;
  color: var(--paper-ink-dim);
  background: transparent;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: all 150ms;
}
.tweaks__seg button[data-on="1"] {
  background: #fffdf6;
  color: var(--paper-ink);
  box-shadow: 0 1px 2px rgba(43,38,32,0.1);
  font-weight: 600;
}
.tweaks__hint {
  font-size: 11px;
  color: var(--paper-ink-faint);
  margin-top: 10px;
  line-height: 1.5;
  font-family: var(--font-hand);
}

/* ============================================================
   Responsive
   ============================================================ */
@media (max-width: 900px) {
  .margin-line { display: none; }
  .brand, .tools, .footer { padding-left: 20px; }
  .minimap { display: none; }
}
</style>
</head>
<body>

<div class="paper-bg" aria-hidden="true"></div>
<div class="margin-line" aria-hidden="true"></div>

<div class="app" id="app">

  <header class="brand">
    <div class="brand__mark">llm-wiki</div>
    <div class="brand__title" id="wiki-title">__WIKI_TITLE__</div>
    <div class="brand__sub">
      <span id="n-nodes">—</span> 节点 · <span id="n-edges">—</span> 关联 · 更新 <b id="n-date">—</b>
    </div>
  </header>

  <div class="tools">
    <div class="search">
      <svg class="search__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
      </svg>
      <input type="search" id="search" class="search__input"
             placeholder="搜索节点..." autocomplete="off" spellcheck="false">
      <span class="search__hint">/</span>
      <div class="search__dropdown" id="search-dropdown"></div>
    </div>

    <div class="filters" id="filters">
      <button class="chip chip--extracted" data-type="EXTRACTED" data-on="1">
        <span class="chip__swatch"></span>明确
      </button>
      <button class="chip chip--inferred" data-type="INFERRED" data-on="1">
        <span class="chip__swatch"></span>推断
      </button>
      <button class="chip chip--ambiguous" data-type="AMBIGUOUS" data-on="0">
        <span class="chip__swatch"></span>存疑
      </button>
    </div>

    <div class="tools__spacer"></div>

    <button class="iconbtn" id="btn-refit" title="重新排布">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M12 3v3m0 12v3M3 12h3m12 0h3M5.6 5.6l2.1 2.1m8.6 8.6 2.1 2.1M5.6 18.4l2.1-2.1m8.6-8.6 2.1-2.1"/>
      </svg>
    </button>
    <button class="iconbtn" id="btn-fit" title="适应画布">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/>
      </svg>
    </button>
    <button class="iconbtn" id="btn-tweaks" title="视觉变体">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v4M12 18v4M2 12h4M18 12h4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M4.9 19.1l2.8-2.8M16.3 7.7l2.8-2.8"/>
      </svg>
    </button>
  </div>

  <main class="canvas-wrap">
    <svg id="canvas" tabindex="0" role="img" aria-label="知识图谱"></svg>

    <div class="legend">
      <div class="legend__title">图例</div>
      <div class="legend__row"><span class="legend__card" style="color: var(--node-entity)"></span><span class="legend__glyph" style="color: var(--node-entity)">◇</span>实体 entity</div>
      <div class="legend__row"><span class="legend__card" style="color: var(--node-topic)"></span><span class="legend__glyph" style="color: var(--node-topic)">✦</span>主题 topic</div>
      <div class="legend__row"><span class="legend__card" style="color: var(--node-source)"></span><span class="legend__glyph" style="color: var(--node-source)">§</span>来源 source</div>
    </div>

    <div class="zoom-ctrl">
      <button id="zoom-in" title="放大">＋</button>
      <button id="zoom-out" title="缩小">−</button>
    </div>

    <div class="minimap">
      <div class="minimap__label">小地图</div>
      <svg id="minimap-svg"></svg>
    </div>

    <div class="toast" id="toast"></div>

    <div class="loading" id="loading">
      <svg class="loading__scribble" viewBox="0 0 120 40">
        <path d="M5 20 Q 15 5, 30 20 T 60 20 T 90 20 T 115 20" fill="none"
              stroke="var(--paper-ink-dim)" stroke-width="2" stroke-linecap="round"
              stroke-dasharray="200" stroke-dashoffset="200">
          <animate attributeName="stroke-dashoffset" from="200" to="0" dur="1.4s" repeatCount="indefinite"/>
        </path>
      </svg>
      <div>正在布置节点...</div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__stats">
      <b id="foot-shown">0</b>/<b id="foot-total">0</b> 节点 ·
      <b id="foot-communities">0</b> 社区 ·
      过滤 <b id="foot-filter">EXTRACTED+INFERRED</b>
    </div>
    <div>
      generated by <a href="https://github.com/sdyckjq-lab/llm-wiki-skill" target="_blank" rel="noopener">llm-wiki</a>
    </div>
  </footer>

  <!-- DRAWER -->
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-inner">
      <div class="drawer-head">
        <div class="drawer-head__main">
          <div class="drawer-kicker" id="dr-kicker">Entity</div>
          <h1 class="drawer-title" id="dr-title">—</h1>
          <div class="drawer-meta">
            <span id="dr-community" hidden>社区 —</span>
            <span id="dr-degree">0 条关联</span>
          </div>
        </div>
        <button class="drawer-close" id="dr-close" title="关闭">×</button>
      </div>

      <div class="drawer-body" id="dr-body"></div>

      <div class="drawer-neighbors" id="dr-neighbors">
        <h4>相邻节点</h4>
        <div class="nb-list" id="nb-list"></div>
      </div>
    </div>
  </aside>
</div>

<!-- TWEAKS PANEL -->
<div class="tweaks" id="tweaks">
  <h3 class="tweaks__title">Tweaks</h3>

  <label class="tweaks__label">视觉变体</label>
  <div class="tweaks__seg" id="seg-variant">
    <button data-val="wash" data-on="1">水彩</button>
    <button data-val="paper">笔记本</button>
    <button data-val="vellum">羊皮卷</button>
    <button data-val="blueprint">设计稿</button>
  </div>

  <label class="tweaks__label">节点形态</label>
  <div class="tweaks__seg" id="seg-nodestyle">
    <button data-val="card" data-on="1">卡片</button>
    <button data-val="organic">手绘</button>
  </div>

  <label class="tweaks__label">节点大小映射</label>
  <div class="tweaks__seg" id="seg-size">
    <button data-val="uniform" data-on="1">统一</button>
    <button data-val="degree">按度数</button>
    <button data-val="type">按类型</button>
  </div>

  <label class="tweaks__label">社区展现</label>
  <div class="tweaks__seg" id="seg-bubble">
    <button data-val="wash" data-on="1">水彩</button>
    <button data-val="hull">气泡</button>
    <button data-val="color">仅颜色</button>
    <button data-val="off">关闭</button>
  </div>

  <div class="tweaks__hint">
    ✎ 即时生效，刷新不丢失
  </div>
</div>

<script id="graph-data" type="application/json">
